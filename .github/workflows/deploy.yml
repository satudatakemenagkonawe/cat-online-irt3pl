name: Auto Deploy to Shinyapps
on:
  push:
    branches: [ main ] # Akan berjalan otomatis saat Anda klik 'Commit' di GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Mempercepat instalasi paket R

      - name: Install Dependencies
        run: |
          Rscript -e 'install.packages(c("rsconnect", "shiny", "httr", "jsonlite", "bslib"))'

      - name: Deploy to Shinyapps.io
        run: |
          Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYAPPS_NAME }}', token='${{ secrets.SHINYAPPS_TOKEN }}', secret='${{ secrets.SHINYAPPS_SECRET }}')"
          Rscript -e "rsconnect::deployApp(appName='cat-online-irt3pl', forceUpdate = TRUE)"
